! ============================================================
! UniFi BGP Configuration — Proxmox Peering
! Network App 10.x — Apply entirely via SSH (no UI needed)
!
! SSH into UniFi gateway, then run:
!   vtysh -f /path/to/proxmox-bgp.conf
!   -- or paste into: vtysh → configure terminal → ... → write memory
! ============================================================

router bgp 65001
 bgp router-id 10.24.0.1
 neighbor 10.24.0.10 remote-as 65002
 neighbor 10.24.0.11 remote-as 65002
 neighbor 10.24.0.13 remote-as 65002
 neighbor 10.24.0.15 remote-as 65002
!
 address-family ipv4 unicast
  neighbor 10.24.0.10 activate
  neighbor 10.24.0.11 activate
  neighbor 10.24.0.13 activate
  neighbor 10.24.0.15 activate
 exit-address-family
!
 address-family l2vpn evpn
  neighbor 10.24.0.10 activate
  neighbor 10.24.0.11 activate
  neighbor 10.24.0.13 activate
  neighbor 10.24.0.15 activate
 exit-address-family
!
line vty
!